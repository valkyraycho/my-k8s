apiVersion: v1
kind: Pod
metadata:
  name: sidecar-demo
spec:
  containers:
    - name: server
      image: busybox
      command: ["sh", "-c", "echo 'hello from sidecar pod' > /tmp/index.html && httpd -f -p 8080 -h /tmp"]
    - name: log-tail
      image: busybox
      command: ["sh", "-c", "while true; do echo tick; sleep 5; done"]